<!DOCTYPE html>
<html>
    <head>
        <title>Esri 3D</title>

        <!-- Runtime dependencies expected as window globals by smk.es.js -->
        <script src="../../../src/lib/jquery-3.3.1.min.js"></script>
        <script src="../../../src/lib/vue-2.5.11.min.js"></script>
        <link rel="stylesheet" href="../../../src/lib/leaflet/leaflet-1.7.1.css"/>
        <script src="../../../src/lib/leaflet/leaflet-1.7.1.js"></script>
        <script src="../../../src/lib/leaflet/esri-leaflet-3.0.19.min.js"></script>
        <script src="../../../src/lib/leaflet/maplibre-gl-3.6.2.min.js"></script>
        <script src="../../../src/lib/leaflet/esri-leaflet-vector-4.3.1.min.js"></script>
        <script src="../../../src/lib/leaflet/esri-leaflet-static-basemap-tile-1.0.0.min.js"></script>
        <script src="../../../src/lib/proj4-2.4.4.min.js"></script>
        <script src="../../../src/lib/turf-5.1.6.min.js"></script>

        <!--
            Configure Dojo AMD *before* the ArcGIS API script runs.
            'fcl' package location is relative to the page URL (Dojo baseUrl).
            From this page: /debug/feature/INIT/ + ../../../src/lib/esri3d
                          = /src/lib/esri3d
        -->
        <script>
            // Compute an absolute URL so Dojo resolves fcl/ correctly
            // regardless of its own baseUrl (which may be CDN-based).
            var dojoConfig = {
                packages: [ {
                    name:     'fcl',
                    location: new URL( '../../../src/lib/esri3d', document.baseURI ).href
                } ],
                has: { 'esri-promise-compatibility': 1 }
            };
        </script>

        <!-- ArcGIS JS API 4.18 - blocking script, sets window.require / window.define -->
        <link rel="stylesheet" href="https://js.arcgis.com/4.18/esri/css/main.css"/>
        <script src="https://js.arcgis.com/4.18/"></script>

        <!--
            Load SMK as an ES module (dist/smk.es.js) rather than the UMD build.
            ES modules have no UMD AMD-detection wrapper, so there is no conflict
            with Dojo's window.define.  Module scripts are deferred: they execute
            after all blocking script tags (including ArcGIS 4.18) have run, so
            window.require (Dojo) is available when types-esri3d.ts calls require().
        -->
        <script type="module" src="../../../dist/smk.es.js"></script>
        <link rel="stylesheet" type="text/css" href="../../../dist/smk.css"/>
        <link rel="stylesheet" type="text/css" href="style.css"/>
    </head>
    <body>
        <div id="smk-map-frame"></div>
        <!--
            This module script runs after smk.es.js has been fully evaluated
            (module scripts execute in document order), so window.SMK.INIT is set.
        -->
        <script type="module">
            SMK.INIT( {
                containerSel:   '#smk-map-frame',
                config:         [ '?', '../../../debug/config/esri3d-all.json' ]
            } )
        </script>
    </body>
</html>
